name: CI

on:
  push:
  pull_request:

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: ./.github/workflows/actions/setup-workspace
        with:
          node-version: '20'

      - name: 👷 Build Packages
        run: pnpm run build
        shell: bash

      - name: ⬆️ Upload Build Artifacts
        uses: ./.github/workflows/actions/upload-archive
        with:
          name: wdio-electron-service
          output: wdio-electron-service-build.zip
          paths: packages/*/dist packages/*/cjs
  lint:
    needs: [build]
    uses: ./.github/workflows/ci-unit.yml

  unit:
    needs: [build, lint]
    uses: ./.github/workflows/ci-unit.yml

  e2e-win:
    name: E2E Tests
    needs: [build]
    uses: ./.github/workflows/ci-win.yml
    with:
      node-version: '20'

  e2e-mac:
    name: E2E for Mac
    needs: [build]
    uses: ./.github/workflows/ci-mac.yml
    with:
      node-version: '20'

  e2e-linux:
    name: E2E for Linux
    needs: [build]
    uses: ./.github/workflows/ci-lnx.yml
    with:
      node-version: '20'
