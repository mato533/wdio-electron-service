name: E2E Tests - Windows

on:
  workflow_call:
    # Make this a reusable workflow, no value needed
    # https://docs.github.com/en/actions/using-workflows/reusing-workflows
    inputs:
      node-version:
        required: true
        type: string
      e2e-scenario:
        required: true
        type: string
        # default: '["builder", "forge", "no-binary"]'

jobs:
  e2e:
    name: E2E ${{ inputs.e2e-scenario }}-${{ matrix.type }} tests (windows.${{ inputs.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'windows-latest', 'macos-latest']
        include:
          - os: 'windows-latest'
            type: 'cjs'
          - os: 'windows-latest'
            type: 'esm'
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
      - uses: ./.github/workflows/actions/setup-workspace
        with:
          node-version: ${{ inputs.node-version }}
      - name: Download Build Archive
        uses: ./.github/workflows/actions/download-archive
        with:
          name: wdio-electron-service
          path: .
          filename: wdio-electron-service-build.zip

      - run: pnpm exec turbo run build --filter=example-${{ inputs.e2e-scenario }}-${{ !matrix.type && '*' || matrix.type }} --only
        shell: bash

      - run: pnpm exec turbo run init-e2es test:e2e:${{ inputs.e2e-scenario }}-esm test:e2e:${{ inputs.e2e-scenario }}-cjs --only --concurrency=1
        shell: bash
        if: ${{ !matrix.type }}
      - run: pnpm exec turbo run init-e2es test:e2e:${{ inputs.e2e-scenario }}-${{matrix.type}} --only --concurrency=1
        shell: bash
        if: ${{ matrix.type }}

      - name: 🐛 Show logs
        shell: bash
        if: failure()
        run: |
          pnpm run ci:e2e:logs
      - name: 🐛 Upload logs
        uses: ./.github/workflows/actions/upload-archive
        if: failure()
        with:
          name: ${{ matrix.os }}-e2e-${{ inputs.e2e-scenario }}-${{ matrix.type }}-logs
          output: ${{ matrix.os }}-e2e-${{ inputs.e2e-scenario }}-${{ matrix.type }}-logs.zip
          paths: e2e/*/*.log
      - name: 🐛 Debug Build
        uses: stateful/vscode-server-action@v1.1.0
        if: failure()
        with:
          timeout: '180000'
